name: phone
description: Sailing Assistant phone app (race-time UI for the Pixel).
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

resolution: workspace

dependencies:
  cupertino_icons: ^1.0.8
  data:
    path: ../../packages/data
  domain:
    path: ../../packages/domain
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  shared:
    path: ../../packages/shared

  uuid: ^4.5.1
dev_dependencies:
  drift: ^2.33.0
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
