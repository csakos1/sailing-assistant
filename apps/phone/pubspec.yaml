name: phone
description: Sailing Assistant phone app (race-time UI for the Pixel).
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

resolution: workspace

dependencies:
  cupertino_icons: ^1.0.8
  data:
    path: ../../packages/data
  domain:
    path: ../../packages/domain
  flutter:
    sdk: flutter
  flutter_foreground_task: ^9.2.2
  flutter_localizations:
    sdk: flutter
  flutter_map: ^7.0.0
  flutter_riverpod: ^2.5.0
  geolocator: ^14.0.0
  latlong2: ^0.9.0
  shared:
    path: ../../packages/shared

  uuid: ^4.5.1
  wakelock_plus: ^1.4.0
  wearable_bridge:
    path: ../../packages/wearable_bridge
dev_dependencies:
  drift: ^2.33.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/polars/foretack.pol

flutter_launcher_icons:
  android: true
  ios: false
  min_sdk_android: 21
  image_path: "assets/icon/foretack_legacy.png"
  adaptive_icon_background: "#0A1A2F"        # a SAJÁT sötétkéked – ugyanaz, amivel a legacy-t generáltad
  adaptive_icon_foreground: "assets/icon/foretack_foreground.png"